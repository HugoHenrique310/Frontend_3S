<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="pt-BR">
    <title>Frontend</title>
    <!--Link do BOOTSTRAP - antes do CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--Link de Icons do Bootstrap-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!--Link do CSS-->
    <link rel="stylesheet" href="/static/css/style.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
          rel="stylesheet">
</head>
<body>
<div class="menu">
    <ul>
        <li><a href="{{url_for('home')}}">Home</a></li>
        <li><a href="{{url_for('calculos')}}">Cálculos</a></li>
        <li><a href="{{url_for('funcionarios')}}">Funcionários</a></li>
        <li><a href="{{url_for('animais')}}">Animais</a></li>
        {% if current_user.is_authenticated%}
        <li><a data-bs-toggle="modal" data-bs-target="#modalLogout" href="">{{ current_user.nome }}</a></li>
        {% else %}
        <li><a href="{{url_for('login')}}">Login</a></li>
        {% endif %}
    </ul>
</div>

<div class="modal fade" id="modalLogout" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
     aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="staticBackdropLabel">Deseja sair?</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-footer">
                <a href="{{ url_for('logout')}}" class="btn btn-danger">Sair</a>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
            </div>
        </div>
    </div>
</div>


<div class="conteudo">
    {% block conteudo %}

    {% endblock %}
</div>

<!-- Link do javascript para o bootstrap - Sempre no final do body-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

<script src="/static/js/verificacoes.js"></script>
<script src="/static/js/apis.js"></script>
</body>
</html>
